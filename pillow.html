<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眠丘寢具 · 好枕頭專賣</title>
<style>
  :root{
    --bg:#eef1f0;
    --paper:#fbfcfc;
    --ink:#26312f;
    --sage:#6f8b80;
    --sage-dk:#5a766b;
    --sand:#d9c4a8;
    --line:#dde4e1;
    --shadow:0 8px 30px rgba(38,49,47,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Helvetica Neue","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;
    background-image:radial-gradient(rgba(120,140,130,.05) 1px,transparent 1px);
    background-size:4px 4px;
  }
  h1,h2,h3,.serif{font-family:Georgia,"Noto Serif TC",serif;}

  header{position:sticky;top:0;z-index:40;background:rgba(251,252,252,.9);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .bar{max-width:1080px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:center;gap:12px}
  .mark{width:38px;height:38px}
  .brand b{font-family:Georgia,serif;font-size:20px;letter-spacing:.5px}
  .brand span{display:block;font-size:11px;letter-spacing:3px;color:var(--sage)}
  .cart-btn{position:relative;border:none;cursor:pointer;background:var(--ink);color:#fff;
    padding:10px 18px 10px 16px;border-radius:30px;font-size:14px;display:flex;align-items:center;gap:8px;transition:transform .15s;}
  .cart-btn:hover{transform:translateY(-1px)}
  .badge{background:var(--sage);color:#fff;font-size:12px;font-weight:700;min-width:20px;height:20px;border-radius:10px;
    display:inline-flex;align-items:center;justify-content:center;padding:0 5px;}

  .hero{max-width:1080px;margin:0 auto;padding:56px 24px 28px;display:grid;grid-template-columns:1.1fr .9fr;gap:36px;align-items:center;}
  .hero .eyebrow{font-size:13px;letter-spacing:4px;color:var(--sage-dk);font-weight:700}
  .hero h1{font-size:46px;line-height:1.15;margin:14px 0 16px}
  .hero p{font-size:16px;color:var(--sage-dk);max-width:42ch}
  .hero .cta{margin-top:24px;display:inline-block;background:var(--sage);color:#fff;text-decoration:none;
    padding:13px 28px;border-radius:30px;font-size:15px;box-shadow:var(--shadow);transition:background .15s;}
  .hero .cta:hover{background:var(--sage-dk)}
  .hero-art{aspect-ratio:1/1;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);background:#e3e8e5;}
  .hero-art svg{width:100%;height:100%;display:block}

  .section-head{max-width:1080px;margin:40px auto 0;padding:0 24px;display:flex;align-items:baseline;justify-content:space-between;}
  .section-head h2{font-size:26px}
  .section-head span{font-size:13px;color:var(--sage-dk)}
  .grid{max-width:1080px;margin:22px auto 0;padding:0 24px 80px;display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s;}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
  .thumb{aspect-ratio:4/3;background:#e6ebe8}
  .thumb svg{width:100%;height:100%;display:block}
  .card-body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:6px;flex:1}
  .tag{font-size:11px;letter-spacing:2px;color:var(--sage-dk);font-weight:700}
  .card-body h3{font-size:19px}
  .desc{font-size:13px;color:var(--sage-dk);flex:1}
  .price-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .price{font-family:Georgia,serif;font-size:22px}
  .price small{font-size:13px;color:var(--sage-dk)}
  .add{border:none;cursor:pointer;background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;transition:background .15s;}
  .add:hover{background:var(--sage-dk)}
  .add.added{background:var(--sage)}

  .overlay{position:fixed;inset:0;background:rgba(38,49,47,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
  .overlay.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:90vw;background:var(--paper);z-index:60;
    box-shadow:-10px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0)}
  .drawer h2{padding:22px 24px;border-bottom:1px solid var(--line);font-size:20px;display:flex;justify-content:space-between;align-items:center}
  .close{background:none;border:none;font-size:26px;cursor:pointer;color:var(--sage-dk);line-height:1}
  .items{flex:1;overflow-y:auto;padding:8px 24px}
  .empty{color:var(--sage-dk);text-align:center;padding:60px 20px;font-size:14px}
  .line{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid var(--line)}
  .line .pic{width:54px;height:54px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#e6ebe8}
  .line .pic svg{width:100%;height:100%}
  .line .info{flex:1}
  .line .info b{font-size:15px;font-weight:600}
  .line .info .p{font-size:13px;color:var(--sage-dk)}
  .qty{display:flex;align-items:center;gap:10px;margin-top:6px}
  .qty button{width:24px;height:24px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;font-size:15px}
  .foot{padding:20px 24px;border-top:1px solid var(--line)}
  .total{display:flex;justify-content:space-between;font-size:18px;margin-bottom:16px}
  .total b{font-family:Georgia,serif;font-size:24px}
  .checkout{width:100%;border:none;cursor:pointer;background:var(--sage);color:#fff;padding:15px;border-radius:12px;font-size:16px;transition:background .15s;}
  .checkout:hover{background:var(--sage-dk)}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
    padding:14px 26px;border-radius:30px;font-size:14px;opacity:0;pointer-events:none;transition:all .3s;z-index:80;box-shadow:var(--shadow);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  footer{border-top:1px solid var(--line);padding:30px 24px;text-align:center;color:var(--sage-dk);font-size:13px}

  @media(max-width:780px){.hero{grid-template-columns:1fr;padding-top:32px}.hero h1{font-size:34px}.hero-art{max-width:320px}.grid{grid-template-columns:1fr 1fr;gap:16px}}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="19" fill="#26312f"/>
        <rect x="9" y="15" width="22" height="13" rx="6.5" fill="#fbfcfc"/>
        <path d="M14 21h12" stroke="#6f8b80" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M11 14c2-3 16-3 18 0" stroke="#d9c4a8" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <div><b>眠丘寢具</b><span>MINKYU SLEEP</span></div>
    </div>
    <button class="cart-btn" onclick="openCart()">購物車 <span class="badge" id="badge">0</span></button>
  </div>
</header>

<section class="hero">
  <div>
    <div class="eyebrow">睡眠實驗室調校</div>
    <h1>換顆好枕頭<br>比換床墊更有感</h1>
    <p>每一顆都依睡姿與肩頸高度設計。30 天試睡，睡不慣免費換一顆，找到屬於你的那一顆為止。</p>
    <a href="#shop" class="cta">挑你的睡姿枕 →</a>
  </div>
  <div class="hero-art">
    <svg viewBox="0 0 400 400">
      <rect width="400" height="400" fill="#dfe6e2"/>
      <ellipse cx="200" cy="300" rx="150" ry="26" fill="#cbd6cf"/>
      <g transform="rotate(-6 200 200)">
        <rect x="80" y="150" width="240" height="120" rx="48" fill="#fbfcfc"/>
        <rect x="80" y="150" width="240" height="120" rx="48" fill="none" stroke="#6f8b80" stroke-width="6"/>
        <path d="M120 210h160" stroke="#d9c4a8" stroke-width="6" stroke-linecap="round"/>
        <circle cx="120" cy="160" r="6" fill="#d9c4a8"/>
        <circle cx="280" cy="160" r="6" fill="#d9c4a8"/>
      </g>
      <path d="M150 110q6-16 20-10" stroke="#6f8b80" stroke-width="5" fill="none" stroke-linecap="round" opacity=".5"/>
      <text x="265" y="120" font-family="Georgia" font-size="38" fill="#6f8b80" opacity=".6">z</text>
      <text x="290" y="100" font-family="Georgia" font-size="26" fill="#6f8b80" opacity=".4">z</text>
    </svg>
  </div>
</section>

<div class="section-head" id="shop">
  <h2>依睡姿選枕</h2>
  <span>30 天試睡 · 不滿意免費換</span>
</div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<aside class="drawer" id="drawer">
  <h2>你的購物車 <button class="close" onclick="closeCart()">×</button></h2>
  <div class="items" id="items"></div>
  <div class="foot">
    <div class="total"><span>合計</span><b id="total">NT$0</b></div>
    <button class="checkout" onclick="checkout()">前往結帳</button>
  </div>
</aside>

<div class="toast" id="toast"></div>
<footer>眠丘寢具 · 台北市信義區 · 這是一個教學示範網站</footer>

<script>
function pillowArt(c1,c2){
  return `<svg viewBox="0 0 200 150">
    <rect width="200" height="150" fill="${c1}"/>
    <g transform="rotate(-5 100 80)">
      <rect x="34" y="50" width="132" height="66" rx="28" fill="${c2}"/>
      <rect x="34" y="50" width="132" height="66" rx="28" fill="none" stroke="${c1}" stroke-width="3" opacity=".5"/>
      <path d="M58 83h84" stroke="${c1}" stroke-width="4" stroke-linecap="round" opacity=".55"/>
      <circle cx="58" cy="58" r="3.5" fill="${c1}" opacity=".6"/>
      <circle cx="142" cy="58" r="3.5" fill="${c1}" opacity=".6"/>
    </g>
  </svg>`;
}

const PRODUCTS = [
  {id:1, name:"記憶棉 護頸枕", tag:"仰睡 · 支撐", price:1280, c1:"#d7e0db", c2:"#7d9389", desc:"慢回彈貼合頸椎曲線，仰睡族的標準答案。"},
  {id:2, name:"天然乳膠枕", tag:"通用 · 透氣", price:1580, c1:"#e0d8c8", c2:"#b79c78", desc:"Q彈不悶熱，抗菌防螨，整夜乾爽。"},
  {id:3, name:"側睡專用 高枕", tag:"側睡 · 加高", price:1380, c1:"#d6dde2", c2:"#788a96", desc:"加高設計填滿肩頸空隙，側睡不再壓手臂。"},
  {id:4, name:"水洗羽絨枕", tag:"趴睡 · 柔軟", price:1180, c1:"#e6e2da", c2:"#a9a294", desc:"蓬鬆好塑形，可整顆機洗，趴睡也不悶。"},
  {id:5, name:"蕎麥殼 透氣枕", tag:"硬式 · 涼感", price:980, c1:"#ddd6c4", c2:"#9c8e63", desc:"傳統蕎麥殼，可調高度，夏天睡特別涼。"},
  {id:6, name:"兒童 成長枕", tag:"兒童 · 護脊", price:880, c1:"#e3dde6", c2:"#9b8aa6", desc:"低敏布料、低高度，陪孩子護好成長中的脊椎。"}
];

let cart = {};

function render(){
  document.getElementById('grid').innerHTML = PRODUCTS.map(p=>`
    <div class="card">
      <div class="thumb">${pillowArt(p.c1,p.c2)}</div>
      <div class="card-body">
        <div class="tag">${p.tag}</div>
        <h3>${p.name}</h3>
        <div class="desc">${p.desc}</div>
        <div class="price-row">
          <div class="price"><small>NT$</small> ${p.price.toLocaleString()}</div>
          <button class="add" id="add-${p.id}" onclick="add(${p.id})">加入購物車</button>
        </div>
      </div>
    </div>`).join('');
}

function add(id){
  cart[id]=(cart[id]||0)+1;
  const b=document.getElementById('add-'+id);
  b.textContent='已加入 ✓'; b.classList.add('added');
  setTimeout(()=>{b.textContent='加入購物車'; b.classList.remove('added')},900);
  const p=PRODUCTS.find(x=>x.id===id);
  toast(`已加入「${p.name}」`); update();
}

function update(){
  const count=Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('badge').textContent=count;
  const total=Object.entries(cart).reduce((s,[id,q])=>s+PRODUCTS.find(p=>p.id==id).price*q,0);
  document.getElementById('total').textContent='NT$'+total.toLocaleString();
  const items=document.getElementById('items');
  const ids=Object.keys(cart).filter(id=>cart[id]>0);
  if(ids.length===0){ items.innerHTML='<div class="empty">購物車是空的<br>挑一顆好枕頭吧 🌙</div>'; return; }
  items.innerHTML=ids.map(id=>{
    const p=PRODUCTS.find(x=>x.id==id); const q=cart[id];
    return `<div class="line">
      <div class="pic">${pillowArt(p.c1,p.c2)}</div>
      <div class="info"><b>${p.name}</b><div class="p">NT$${p.price.toLocaleString()}</div>
        <div class="qty"><button onclick="setQty(${id},-1)">−</button><span>${q}</span><button onclick="setQty(${id},1)">＋</button></div>
      </div></div>`;
  }).join('');
}

function setQty(id,d){ cart[id]=Math.max(0,(cart[id]||0)+d); update(); }
function openCart(){ document.getElementById('overlay').classList.add('open'); document.getElementById('drawer').classList.add('open'); }
function closeCart(){ document.getElementById('overlay').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
function checkout(){
  const count=Object.values(cart).reduce((a,b)=>a+b,0);
  if(count===0){ toast('購物車還是空的喔'); return; }
  toast('訂單成立！（這是示範，不會真的扣款）'); cart={}; update(); closeCart();
}
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800); }

render(); update();
</script>
</body>
</html>
