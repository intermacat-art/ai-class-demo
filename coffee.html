<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小山焙煎所 · 精品咖啡豆</title>
<style>
  :root{
    --cream:#f4efe6;
    --paper:#fbf8f2;
    --espresso:#2e241d;
    --coffee:#5a4433;
    --terra:#c2683f;
    --terra-dk:#a9542f;
    --line:#e2d8c8;
    --shadow:0 8px 30px rgba(46,36,29,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Helvetica Neue","Noto Sans TC",system-ui,sans-serif;
    background:var(--cream);
    color:var(--espresso);
    line-height:1.6;
    /* 紙紋 */
    background-image:radial-gradient(rgba(180,160,130,.06) 1px,transparent 1px);
    background-size:4px 4px;
  }
  h1,h2,h3,.serif{font-family:Georgia,"Noto Serif TC",serif;}

  /* ---- 頂部 ---- */
  header{
    position:sticky;top:0;z-index:40;
    background:rgba(251,248,242,.9);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .bar{
    max-width:1080px;margin:0 auto;padding:16px 24px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:12px}
  .mark{width:38px;height:38px}
  .brand b{font-family:Georgia,serif;font-size:20px;letter-spacing:.5px}
  .brand span{display:block;font-size:11px;letter-spacing:3px;color:var(--coffee)}
  .cart-btn{
    position:relative;border:none;cursor:pointer;
    background:var(--espresso);color:#fff;
    padding:10px 18px 10px 16px;border-radius:30px;
    font-size:14px;display:flex;align-items:center;gap:8px;
    transition:transform .15s;
  }
  .cart-btn:hover{transform:translateY(-1px)}
  .badge{
    background:var(--terra);color:#fff;font-size:12px;font-weight:700;
    min-width:20px;height:20px;border-radius:10px;
    display:inline-flex;align-items:center;justify-content:center;padding:0 5px;
  }

  /* ---- 主視覺 ---- */
  .hero{
    max-width:1080px;margin:0 auto;padding:56px 24px 28px;
    display:grid;grid-template-columns:1.1fr .9fr;gap:36px;align-items:center;
  }
  .hero .eyebrow{font-size:13px;letter-spacing:4px;color:var(--terra-dk);font-weight:700}
  .hero h1{font-size:46px;line-height:1.15;margin:14px 0 16px}
  .hero p{font-size:16px;color:var(--coffee);max-width:42ch}
  .hero .cta{
    margin-top:24px;display:inline-block;background:var(--terra);color:#fff;
    text-decoration:none;padding:13px 28px;border-radius:30px;font-size:15px;
    box-shadow:var(--shadow);transition:background .15s;
  }
  .hero .cta:hover{background:var(--terra-dk)}
  .hero-art{
    aspect-ratio:1/1;border-radius:24px;overflow:hidden;
    box-shadow:var(--shadow);background:#e9ddca;
  }
  .hero-art svg{width:100%;height:100%;display:block}

  /* ---- 商品 ---- */
  .section-head{
    max-width:1080px;margin:40px auto 0;padding:0 24px;
    display:flex;align-items:baseline;justify-content:space-between;
  }
  .section-head h2{font-size:26px}
  .section-head span{font-size:13px;color:var(--coffee)}
  .grid{
    max-width:1080px;margin:22px auto 0;padding:0 24px 80px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:24px;
  }
  .card{
    background:var(--paper);border:1px solid var(--line);border-radius:18px;
    overflow:hidden;display:flex;flex-direction:column;
    transition:transform .18s,box-shadow .18s;
  }
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
  .thumb{aspect-ratio:4/3;background:#ece0cd}
  .thumb svg{width:100%;height:100%;display:block}
  .card-body{padding:18px 18px 20px;display:flex;flex-direction:column;gap:6px;flex:1}
  .roast{font-size:11px;letter-spacing:2px;color:var(--terra-dk);font-weight:700}
  .card-body h3{font-size:19px}
  .desc{font-size:13px;color:var(--coffee);flex:1}
  .price-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
  .price{font-family:Georgia,serif;font-size:22px}
  .price small{font-size:13px;color:var(--coffee)}
  .add{
    border:none;cursor:pointer;background:var(--espresso);color:#fff;
    padding:10px 16px;border-radius:10px;font-size:14px;transition:background .15s;
  }
  .add:hover{background:var(--coffee)}
  .add.added{background:var(--terra)}

  /* ---- 購物車 ---- */
  .overlay{
    position:fixed;inset:0;background:rgba(46,36,29,.45);
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;
  }
  .overlay.open{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;right:0;height:100%;width:380px;max-width:90vw;
    background:var(--paper);z-index:60;box-shadow:-10px 0 40px rgba(0,0,0,.18);
    transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;
  }
  .drawer.open{transform:translateX(0)}
  .drawer h2{padding:22px 24px;border-bottom:1px solid var(--line);font-size:20px;
    display:flex;justify-content:space-between;align-items:center}
  .close{background:none;border:none;font-size:26px;cursor:pointer;color:var(--coffee);line-height:1}
  .items{flex:1;overflow-y:auto;padding:8px 24px}
  .empty{color:var(--coffee);text-align:center;padding:60px 20px;font-size:14px}
  .line{display:flex;gap:12px;padding:16px 0;border-bottom:1px solid var(--line)}
  .line .pic{width:54px;height:54px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#ece0cd}
  .line .pic svg{width:100%;height:100%}
  .line .info{flex:1}
  .line .info b{font-size:15px;font-weight:600}
  .line .info .p{font-size:13px;color:var(--coffee)}
  .qty{display:flex;align-items:center;gap:10px;margin-top:6px}
  .qty button{width:24px;height:24px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;font-size:15px}
  .foot{padding:20px 24px;border-top:1px solid var(--line)}
  .total{display:flex;justify-content:space-between;font-size:18px;margin-bottom:16px}
  .total b{font-family:Georgia,serif;font-size:24px}
  .checkout{
    width:100%;border:none;cursor:pointer;background:var(--terra);color:#fff;
    padding:15px;border-radius:12px;font-size:16px;transition:background .15s;
  }
  .checkout:hover{background:var(--terra-dk)}

  .toast{
    position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
    background:var(--espresso);color:#fff;padding:14px 26px;border-radius:30px;
    font-size:14px;opacity:0;pointer-events:none;transition:all .3s;z-index:80;box-shadow:var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  footer{border-top:1px solid var(--line);padding:30px 24px;text-align:center;color:var(--coffee);font-size:13px}

  @media(max-width:780px){
    .hero{grid-template-columns:1fr;padding-top:32px}
    .hero h1{font-size:34px}
    .hero-art{max-width:320px}
    .grid{grid-template-columns:1fr 1fr;gap:16px}
  }
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="bar">
    <div class="brand">
      <svg class="mark" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" fill="#2e241d"/>
        <path d="M13 24c0-5 3-9 7-9s7 4 7 9" stroke="#c2683f" stroke-width="2.4" fill="none" stroke-linecap="round"/>
        <path d="M20 15c0-3 2-5 5-5" stroke="#f4efe6" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="20" cy="27" rx="9" ry="3" fill="#5a4433"/>
      </svg>
      <div><b>小山焙煎所</b><span>KOYAMA ROASTERY</span></div>
    </div>
    <button class="cart-btn" onclick="openCart()">
      購物車 <span class="badge" id="badge">0</span>
    </button>
  </div>
</header>

<section class="hero">
  <div>
    <div class="eyebrow">每週小批次烘焙</div>
    <h1>把一杯好咖啡<br>寄到你家門口</h1>
    <p>產地直送的單一莊園咖啡豆，下單後當週新鮮烘焙。不放隔週的豆，只賣我們自己也每天喝的味道。</p>
    <a href="#shop" class="cta">看看本週的豆子 →</a>
  </div>
  <div class="hero-art">
    <svg viewBox="0 0 400 400">
      <rect width="400" height="400" fill="#e3d3b8"/>
      <circle cx="200" cy="200" r="120" fill="#cdb796"/>
      <path d="M150 150 h100 a20 20 0 0 1 0 80 h-12" fill="none" stroke="#5a4433" stroke-width="10"/>
      <rect x="150" y="150" width="100" height="110" rx="14" fill="#fbf8f2"/>
      <rect x="150" y="150" width="100" height="110" rx="14" fill="none" stroke="#5a4433" stroke-width="8"/>
      <ellipse cx="200" cy="170" rx="42" ry="12" fill="#3b2c20"/>
      <path d="M185 120 q-8 -18 6 -30" stroke="#a9542f" stroke-width="6" fill="none" stroke-linecap="round" opacity=".7"/>
      <path d="M205 118 q-8 -20 6 -34" stroke="#a9542f" stroke-width="6" fill="none" stroke-linecap="round" opacity=".5"/>
      <path d="M222 122 q-8 -18 6 -30" stroke="#a9542f" stroke-width="6" fill="none" stroke-linecap="round" opacity=".6"/>
    </svg>
  </div>
</section>

<div class="section-head" id="shop">
  <h2>本週上架</h2>
  <span>下單後當週烘焙 · 滿 NT$800 免運</span>
</div>
<div class="grid" id="grid"></div>

<!-- 購物車 -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<aside class="drawer" id="drawer">
  <h2>你的購物車 <button class="close" onclick="closeCart()">×</button></h2>
  <div class="items" id="items"></div>
  <div class="foot">
    <div class="total"><span>合計</span><b id="total">NT$0</b></div>
    <button class="checkout" onclick="checkout()">前往結帳</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<footer>小山焙煎所 · 台北市大安區 · 這是一個教學示範網站</footer>

<script>
// 豆子配色（用 SVG 當商品圖，離線也能顯示）
function beanArt(c1,c2){
  return `<svg viewBox="0 0 200 150">
    <rect width="200" height="150" fill="${c1}"/>
    <g fill="${c2}">
      <ellipse cx="70" cy="75" rx="26" ry="34" transform="rotate(-20 70 75)"/>
      <ellipse cx="120" cy="70" rx="26" ry="34" transform="rotate(15 120 70)"/>
      <ellipse cx="98" cy="105" rx="24" ry="31" transform="rotate(-5 98 105)"/>
    </g>
    <g stroke="${c1}" stroke-width="2.4" fill="none" opacity=".6">
      <path d="M70 45 q-4 30 0 60" transform="rotate(-20 70 75)"/>
      <path d="M120 38 q-4 32 0 64" transform="rotate(15 120 70)"/>
      <path d="M98 76 q-4 28 0 58" transform="rotate(-5 98 105)"/>
    </g>
  </svg>`;
}

const PRODUCTS = [
  {id:1, name:"衣索比亞 耶加雪菲", roast:"淺焙 · 花香", price:420, c1:"#dcc7a4", c2:"#7a5a3a", desc:"明亮的柑橘與茉莉花香，喝起來像一口果汁。"},
  {id:2, name:"哥倫比亞 薇拉", roast:"中焙 · 均衡", price:380, c1:"#c9aa7e", c2:"#5f4127", desc:"焦糖與堅果的厚實口感，最耐喝的日常款。"},
  {id:3, name:"瓜地馬拉 安提瓜", roast:"中深焙 · 可可", price:400, c1:"#b89466", c2:"#46301d", desc:"濃郁巧克力尾韻，加牛奶做拿鐵超搭。"},
  {id:4, name:"肯亞 AA", roast:"淺焙 · 莓果", price:460, c1:"#d8b98e", c2:"#6b4326", desc:"黑醋栗與番茄的酸甜，個性強烈的一支。"},
  {id:5, name:"巴西 喜拉朵", roast:"深焙 · 濃苦", price:340, c1:"#a9885c", c2:"#3a2618", desc:"低酸、醇厚帶煙燻，義式濃縮的最佳基底。"},
  {id:6, name:"印尼 曼特寧", roast:"深焙 · 木質", price:390, c1:"#b08f60", c2:"#3f2c1b", desc:"草本與木質調，喝得到南洋大地的厚度。"}
];

let cart = {}; // id -> qty

function render(){
  document.getElementById('grid').innerHTML = PRODUCTS.map(p=>`
    <div class="card">
      <div class="thumb">${beanArt(p.c1,p.c2)}</div>
      <div class="card-body">
        <div class="roast">${p.roast}</div>
        <h3>${p.name}</h3>
        <div class="desc">${p.desc}</div>
        <div class="price-row">
          <div class="price"><small>NT$</small> ${p.price}</div>
          <button class="add" id="add-${p.id}" onclick="add(${p.id})">加入購物車</button>
        </div>
      </div>
    </div>`).join('');
}

function add(id){
  cart[id] = (cart[id]||0)+1;
  const b = document.getElementById('add-'+id);
  b.textContent='已加入 ✓'; b.classList.add('added');
  setTimeout(()=>{b.textContent='加入購物車'; b.classList.remove('added')},900);
  const p = PRODUCTS.find(x=>x.id===id);
  toast(`已加入「${p.name}」`);
  update();
}

function update(){
  const count = Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('badge').textContent = count;
  const total = Object.entries(cart).reduce((s,[id,q])=>s+PRODUCTS.find(p=>p.id==id).price*q,0);
  document.getElementById('total').textContent = 'NT$'+total.toLocaleString();
  const items = document.getElementById('items');
  const ids = Object.keys(cart).filter(id=>cart[id]>0);
  if(ids.length===0){ items.innerHTML='<div class="empty">購物車是空的<br>挑一支豆子吧 ☕</div>'; return; }
  items.innerHTML = ids.map(id=>{
    const p = PRODUCTS.find(x=>x.id==id); const q=cart[id];
    return `<div class="line">
      <div class="pic">${beanArt(p.c1,p.c2)}</div>
      <div class="info">
        <b>${p.name}</b>
        <div class="p">NT$${p.price}</div>
        <div class="qty">
          <button onclick="setQty(${id},-1)">−</button>
          <span>${q}</span>
          <button onclick="setQty(${id},1)">＋</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setQty(id,d){ cart[id]=Math.max(0,(cart[id]||0)+d); update(); }
function openCart(){ document.getElementById('overlay').classList.add('open'); document.getElementById('drawer').classList.add('open'); }
function closeCart(){ document.getElementById('overlay').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
function checkout(){
  const count = Object.values(cart).reduce((a,b)=>a+b,0);
  if(count===0){ toast('購物車還是空的喔'); return; }
  toast('訂單成立！（這是示範，不會真的扣款）');
  cart={}; update(); closeCart();
}

let toastTimer;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

render(); update();
</script>
</body>
</html>
